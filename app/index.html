<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Official website of Issaka Awada Wadi - International Actor, Award Winner, and Public Figure from Chad." />
    <meta name="keywords" content="Issaka Awada Wadi, Actor, Chad, Cinema, African Film, International Actor" />
    <meta name="author" content="Issaka Awada Wadi" />
    <meta name="theme-color" content="#000000" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="ISSAKA AWADA WADI - Official Website" />
    <meta property="og:description" content="International Actor | Award Winner | Public Figure" />
    <meta property="og:type" content="website" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ISSAKA AWADA WADI - Official Website" />
    <meta name="twitter:description" content="International Actor | Award Winner | Public Figure" />
    
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <title>ISSAKA AWADA WADI - Official Website</title>
    
    <style>
      /* Critical CSS for initial load */
      body {
        margin: 0;
        padding: 0;
        background: #000000;
        color: #ffffff;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      
      #root {
        min-height: 100vh;
      }
      
      /* Loading state */
      .loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000000;
        z-index: 9999;
      }
      
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 2px solid rgba(201, 169, 98, 0.3);
        border-top-color: #C9A962;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading">
        <div class="loading-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
